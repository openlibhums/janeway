{# Not used #}

{% if item.has_sub_nav %}
    <li class="nav-item dropdown">
        {# LinkA11y #} <a class="nav-link dropdown-toggle" href="" id="{{ item.link_name|slugify }}"
           data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            {{ item.link_name }}
        </a>
        <div class="dropdown-menu" aria-labelledby="{{ item.link_name|slugify }}">
            {% for subnav in item.sub_nav_items %}
                {# LinkA11y #} <a href="{{ subnav.link }}" class="dropdown-item">{{ subnav.link_name }}</a>
            {% endfor %}
        </div>
    </li>
{% elif not item.for_footer %}
    <li class="nav-item">{# LinkA11y #} <a href="/{{ item.link }}" class="nav-link">{{ item.link_name }}</a></li>
{% endif %}
