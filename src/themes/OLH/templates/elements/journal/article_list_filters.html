{% load classname %}
{% load foundation %}
{% load static %}

{% if facet_form.fields %}
    <section aria-labelledby="filter-title-{{ filter_context }}" class="section">
        <h2 id="filter-title-{{ filter_context }}">{% trans 'Filter' %}</h2>
        <form method="GET" id="{{ facet_form.id }}-{{ filter_context }}">
            {{ facet_form|foundation }}
            <button type="button" class="button secondary" id="select-all-btn-{{ filter_context }}">{% trans 'Select all' %}</button>
            <button type="button" class="button secondary" id="clear-all-btn-{{ filter_context }}">{% trans 'Clear all' %}</button>
            <br/>
            <button action="" class="button" type="submit">{% trans 'Apply' %}</button>
        </form>

        <script src="{% static 'common/js/form-toggle-all.js' %}"></script>
        <script>
            initFormToggleButtons('select-all-btn-{{ filter_context }}',
                    'clear-all-btn-{{ filter_context }}', 
                    '{{ facet_form.id }}-{{ filter_context }}'
                    );
        </script>
    </section>
{% endif %}
