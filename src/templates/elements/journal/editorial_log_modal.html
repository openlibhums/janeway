<!-- Bootstrap Editorial Log Modal (material, clean, clarity themes) -->
<div class="modal fade" id="editorialLogModal" tabindex="-1" role="dialog" aria-labelledby="editorialLogModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editorialLogModalLabel">Editorial Log</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <table class="table table-sm">
          <thead>
            <tr>
              <th>Date</th>
              <th>Event</th>
            </tr>
          </thead>
          <tbody>
            {% for entry in editorial_log %}
              {% if entry.is_comment %}
                {% if entry.comment.public %}
                  <tr>
                    <td>{{ entry.date|date:"d M Y" }}</td>
                    <td>
                      <strong>{{ entry.type }}</strong><br>
                      {{ entry.description|safe }}
                    </td>
                  </tr>
                {% endif %}
              {% else %}
                <tr>
                  <td>{{ entry.date|date:"d M Y" }}</td>
                  <td>{{ entry.description }}</td>
                </tr>
              {% endif %}
            {% endfor %}
          </tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
