{% load static %}

<link rel="stylesheet" href="https://code.jquery.com/ui/1.11.0/themes/smoothness/jquery-ui.css">
<script type="text/javascript" src="{% static "common/js/jq-ui.min.js" %}"></script>
<script src="{% static "common/js/tagit.js" %}"></script>

<script type="text/javascript">
    $(document).ready(function () {
        if (!$("#id_keywords").length) {
            return;
        }

        function getAssignedKeywords() {
            try {
                return $("#id_keywords").tagit("assignedTags");
            } catch (error) {
                return $("#id_keywords")
                    .val()
                    .split(",")
                    .map(function (keyword) {
                        return $.trim(keyword).toLowerCase();
                    })
                    .filter(Boolean);
            }
        }

        $("#id_keywords").attr("autocomplete", "off");

        $("#id_keywords").tagit({
            allowSpaces: true,
            autocomplete: {
                minLength: 3,
                delay: 250,
                appendTo: "body",
                source: function (request, response) {
                    $.getJSON("{{ suggestions_url|escapejs }}", {q: request.term})
                        .done(function (data) {
                            var assignedKeywords = $.map(getAssignedKeywords(), function (keyword) {
                                return keyword.toLowerCase();
                            });
                            var filteredResults = $.grep(data, function (keyword) {
                                return $.inArray(keyword.toLowerCase(), assignedKeywords) === -1;
                            });

                            response(filteredResults);
                        })
                        .fail(function () {
                            response([]);
                        });
                }
            }
        });

        $("#id_keywords")
            .next(".tagit")
            .find(".tagit-new input")
            .attr("autocomplete", "off");
    });
</script>
