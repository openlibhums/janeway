{% load i18n %}
<form method="post" action="{% url 'toggle_accessibility_mode' %}" class="a11y-mobile-form">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.get_full_path }}">
    <button type="submit" class="a11y-mobile-button{% if button_class %} {{ button_class }}{% endif %}"
            aria-pressed="{% if accessibility_mode_active %}true{% else %}false{% endif %}">
        {% if accessibility_mode_active %}{% trans 'Disable accessibility mode' %}{% else %}{% trans 'Enable accessibility mode' %}{% endif %}
    </button>
</form>
